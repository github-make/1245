name: Build Multi-Platform Releases

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
    paths:
      - 'post-deploy.py'
      - 'build*.py'
      - 'build*.spec'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'post-deploy.py'
      - 'build*.py'
      - 'build*.spec'
      - '.github/workflows/build.yml'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
        shell: cmd
      - name: Build Windows binary
        run: pyinstaller build_windows.spec --workpath build/wtemp --distpath dist\windows
        shell: cmd
      - name: List build output
        run: dir dist\windows
        shell: cmd
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenClawPostDeploy-Windows
          path: dist\windows\OpenClawPostDeploy.exe
          retention-days: 30

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
      - name: Build macOS binary
        run: pyinstaller build_macos.spec --workpath build/wtemp --distpath dist/macos
      - name: List build output
        run: ls -la dist/macos/
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenClawPostDeploy-macOS
          path: dist/macos/OpenClawPostDeploy
          retention-days: 30

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
      - name: Build Linux binary
        run: pyinstaller build_linux.spec --workpath build/wtemp --distpath dist/linux
      - name: List build output
        run: ls -la dist/linux/
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenClawPostDeploy-Linux
          path: dist/linux/OpenClawPostDeploy
          retention-days: 30

  release:
    name: Create Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Prepare release files
        run: |
          mkdir -p release
          cp artifacts/OpenClawPostDeploy-Windows/OpenClawPostDeploy.exe release/ || true
          cp artifacts/OpenClawPostDeploy-macOS/OpenClawPostDeploy release/ || true
          cp artifacts/OpenClawPostDeploy-Linux/OpenClawPostDeploy release/ || true
          ls -la release/
      - name: Create checksums
        run: |
          cd release
          sha256sum OpenClawPostDeploy.exe > OpenClawPostDeploy.exe.sha256 || true
          sha256sum OpenClawPostDeploy-macos > OpenClawPostDeploy-macos.sha256 || true
          sha256sum OpenClawPostDeploy-linux > OpenClawPostDeploy-linux.sha256 || true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          generate_release_notes: true
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
